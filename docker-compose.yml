services:
    postgres:
        container_name: petdex-postgres
        image: postgres:18
        ports:
          - "5432:5432"
        environment:
            POSTGRES_USE: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
             - postgres_data:/var/lib/postgresql/data
        
            